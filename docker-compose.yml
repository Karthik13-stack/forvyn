version: '3.8'

services:
  forvyn:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forvyn-app
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DEBUG=true
    env_file:
      - backend/.env
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./archive:/app/archive
      - ./docs:/app/docs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
